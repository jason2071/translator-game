name: release

# Push a version tag (e.g. `v0.2.0`) to build the installers, sign the updater
# artifacts, and publish a GitHub Release (marked latest) with `latest.json`.
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install

      # The Unity (Naninovel) engine embeds a frozen UnityPy helper, a git-ignored
      # build artifact. Freeze it here so build.rs `include_bytes!`s a real exe; if
      # this is skipped the engine ships but falls back to system Python at runtime.
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Freeze Unity (Naninovel) sidecar
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "UnityPy==1.25.2" pyinstaller
          ./scripts/freeze-unity-sidecar.ps1

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "RPGMaker Translator ${{ github.ref_name }}"
          releaseBody: "Download an installer (or the portable .exe) below. Users already on v0.2.0+ update automatically."
          releaseDraft: false
          prerelease: false

      # Also attach the standalone executable as a no-install portable build.
      - name: Attach portable exe
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $dest = "RPGMaker-Translator-portable-${{ github.ref_name }}.exe"
          Copy-Item "src-tauri/target/release/rpgmaker-translator.exe" $dest
          gh release upload ${{ github.ref_name }} $dest --clobber --repo ${{ github.repository }}
